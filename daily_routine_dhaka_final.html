<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>আমার দৈনিক রুটিন</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Arial,sans-serif;background:#f0f0ed;color:#111;min-height:100vh;padding:28px 20px;}
.page{max-width:1060px;margin:0 auto;}
h1{font-size:18px;font-weight:700;text-align:center;margin-bottom:20px;}

.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px;}
.stat{background:#fff;border-radius:10px;padding:12px;border:1px solid #e5e5e2;text-align:center;}
.stat-label{font-size:11px;color:#888;margin-bottom:4px;}
.stat-val{font-size:17px;font-weight:700;color:#111;}
.stat-unit{font-size:10px;color:#888;font-weight:400;display:block;margin-top:1px;}

.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
.toolbar button{font-size:13px;padding:7px 16px;border-radius:20px;border:1px solid #ccc;background:#fff;cursor:pointer;color:#111;}
.toolbar button.primary{background:#1D9E75;color:#fff;border-color:#1D9E75;}
.toolbar button:hover{opacity:.85;}

.layout{display:flex;gap:20px;align-items:flex-start;}
.timeline-wrap{flex:1;min-width:0;}

/* section + block */
.section-label{font-size:10px;font-weight:700;letter-spacing:.08em;color:#999;padding:14px 0 5px 108px;text-transform:uppercase;cursor:pointer;}
.section-label:hover{color:#555;}
.block{display:flex;gap:10px;align-items:stretch;position:relative;}
.block:hover .del-btn{opacity:1;}
.time-col{min-width:92px;text-align:right;padding-top:10px;flex-shrink:0;}
.time-col input{width:92px;font-size:11px;color:#777;background:transparent;border:1px dashed transparent;border-radius:4px;text-align:right;outline:none;padding:2px 4px;font-family:Arial,sans-serif;}
.time-col input:hover{border-color:#ccc;}
.time-col input:focus{border-color:#999;color:#111;}
.line-col{display:flex;flex-direction:column;align-items:center;width:20px;flex-shrink:0;}
.dot{width:11px;height:11px;border-radius:50%;flex-shrink:0;margin-top:11px;cursor:pointer;transition:transform .15s;}
.dot:hover{transform:scale(1.3);}
.vline{width:2px;flex:1;min-height:8px;background:#ddd;margin-top:2px;}
.card{flex:1;border-radius:9px;padding:9px 13px;cursor:pointer;margin-bottom:6px;transition:filter .15s;}
.card:hover{filter:brightness(.96);}
.card.active{outline:2.5px solid #1D9E75;outline-offset:1px;}
.card-title{font-size:13px;font-weight:700;}
.card-sub{font-size:12px;margin-top:3px;opacity:.8;}
.note-count{display:inline-block;font-size:10px;background:rgba(0,0,0,.1);border-radius:8px;padding:1px 7px;margin-left:6px;font-weight:400;}
.del-btn{opacity:0;position:absolute;right:-24px;top:8px;background:transparent;border:none;cursor:pointer;font-size:15px;color:#bbb;padding:2px 4px;}
.del-btn:hover{color:#e00;}

/* RIGHT PANEL */
.right-col{width:280px;flex-shrink:0;display:flex;flex-direction:column;gap:14px;position:sticky;top:28px;}

/* notes panel */
.panel{background:#fff;border-radius:12px;border:1px solid #e5e5e2;padding:16px;}
.panel-title{font-size:12px;font-weight:700;color:#555;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.panel-title span{font-size:16px;}
.np-name{font-size:13px;font-weight:700;color:#111;margin-bottom:2px;}
.np-time{font-size:11px;color:#aaa;margin-bottom:10px;}
.np-empty{font-size:12px;color:#ccc;text-align:center;padding:14px 0;}

.note-item{background:#f8f8f6;border-radius:8px;padding:7px 10px;margin-bottom:6px;position:relative;padding-right:22px;}
.note-text{font-size:12px;color:#333;white-space:pre-wrap;word-break:break-word;}
.note-link{font-size:12px;color:#185FA5;word-break:break-all;text-decoration:none;}
.note-link:hover{text-decoration:underline;}
.note-date{font-size:10px;color:#ccc;margin-top:3px;}
.note-del{position:absolute;top:5px;right:5px;background:none;border:none;cursor:pointer;font-size:12px;color:#ccc;}
.note-del:hover{color:#e00;}

.add-area textarea{width:100%;font-size:12px;padding:7px 10px;border-radius:8px;border:1px solid #ddd;resize:none;height:64px;font-family:Arial,sans-serif;outline:none;color:#111;margin-top:8px;}
.add-area textarea:focus{border-color:#1D9E75;}
.add-btns{display:flex;gap:6px;margin-top:6px;}
.add-btns button{flex:1;font-size:12px;padding:6px;border-radius:8px;border:1px solid #ddd;background:#fff;cursor:pointer;color:#111;font-weight:600;}
.btn-note{background:#1D9E75 !important;color:#fff !important;border-color:#1D9E75 !important;}
.btn-link{background:#185FA5 !important;color:#fff !important;border-color:#185FA5 !important;}

/* CHECKLIST panel */
.checklist-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.checklist-title{font-size:12px;font-weight:700;color:#555;display:flex;align-items:center;gap:6px;}
.checklist-title span{font-size:15px;}
.cl-reset{font-size:11px;color:#aaa;background:none;border:none;cursor:pointer;padding:0;}
.cl-reset:hover{color:#e00;}
.cl-date{font-size:10px;color:#bbb;margin-bottom:10px;}
.cl-progress{height:5px;background:#eee;border-radius:10px;margin-bottom:12px;overflow:hidden;}
.cl-bar{height:100%;background:#1D9E75;border-radius:10px;transition:width .3s;}

.cl-item{display:flex;align-items:flex-start;gap:8px;margin-bottom:8px;padding:7px 10px;border-radius:8px;background:#f8f8f6;cursor:pointer;transition:background .15s;}
.cl-item:hover{background:#f0f0ee;}
.cl-item.done{background:#E1F5EE;}
.cl-item.done .cl-label{color:#0F6E56;text-decoration:line-through;opacity:.7;}
.cl-check{width:17px;height:17px;border-radius:4px;border:2px solid #ccc;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.cl-item.done .cl-check{background:#1D9E75;border-color:#1D9E75;}
.cl-check-tick{display:none;color:#fff;font-size:11px;font-weight:700;}
.cl-item.done .cl-check-tick{display:block;}
.cl-label{font-size:12px;color:#333;flex:1;line-height:1.4;}
.cl-del{background:none;border:none;cursor:pointer;font-size:12px;color:#ddd;flex-shrink:0;padding:0 0 0 4px;}
.cl-del:hover{color:#e00;}

.cl-add{display:flex;gap:6px;margin-top:8px;}
.cl-add input{flex:1;font-size:12px;padding:7px 10px;border-radius:8px;border:1px solid #ddd;outline:none;font-family:Arial,sans-serif;color:#111;}
.cl-add input:focus{border-color:#1D9E75;}
.cl-add button{font-size:12px;padding:7px 12px;border-radius:8px;border:none;background:#1D9E75;color:#fff;cursor:pointer;font-weight:700;}
.cl-add button:hover{opacity:.85;}

/* modal */
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.45);z-index:9999;}
.modal-overlay.open{display:flex;align-items:center;justify-content:center;}
.modal-box{background:#fff;border-radius:14px;padding:22px;width:340px;max-width:92vw;box-shadow:0 8px 40px rgba(0,0,0,.2);}
.modal-box h3{font-size:15px;font-weight:700;margin-bottom:16px;color:#111;}
.field{margin-bottom:11px;}
.field label{display:block;font-size:12px;color:#666;margin-bottom:4px;}
.field input,.field textarea{width:100%;font-size:13px;padding:8px 10px;border-radius:8px;border:1px solid #ddd;background:#fff;color:#111;font-family:Arial,sans-serif;outline:none;}
.field input:focus,.field textarea:focus{border-color:#1D9E75;}
.field textarea{resize:vertical;min-height:56px;}
.colors{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;}
.color-opt{width:26px;height:26px;border-radius:50%;cursor:pointer;border:3px solid transparent;}
.color-opt.selected{border-color:#111;}
.modal-btns{display:flex;justify-content:flex-end;gap:8px;margin-top:16px;}
.modal-btns button{font-size:13px;padding:7px 18px;border-radius:20px;border:1px solid #ccc;background:#fff;cursor:pointer;color:#111;}
.modal-btns .save{background:#1D9E75;color:#fff;border-color:#1D9E75;}

@media(max-width:720px){
  .layout{flex-direction:column;}
  .right-col{width:100%;position:static;}
  .summary{grid-template-columns:repeat(2,1fr);}
}
</style>
</head>
<body>
<div class="page">
  <h1>আমার দৈনিক রুটিন</h1>

  <div class="summary">
    <div class="stat"><div class="stat-label">Bug hunting</div><div class="stat-val">২.৫<span class="stat-unit">ঘণ্টা/দিন</span></div></div>
    <div class="stat"><div class="stat-label">English skill</div><div class="stat-val">১<span class="stat-unit">ঘণ্টা/দিন</span></div></div>
    <div class="stat"><div class="stat-label">অফিস</div><div class="stat-val">৯<span class="stat-unit">ঘণ্টা</span></div></div>
    <div class="stat"><div class="stat-label">নামাজ</div><div class="stat-val">৫<span class="stat-unit">ওয়াক্ত</span></div></div>
  </div>

  <div class="toolbar">
    <button class="primary" onclick="addBlock()">+ নতুন ব্লক</button>
    <button onclick="addSection()">+ সেকশন</button>
  </div>

  <div class="layout">
    <!-- LEFT: timeline -->
    <div class="timeline-wrap" id="timeline"></div>

    <!-- RIGHT: notes + checklist -->
    <div class="right-col">

      <!-- Notes panel -->
      <div class="panel" id="notes-panel">
        <div class="np-name" id="np-title">কোনো ব্লক সিলেক্ট করুন</div>
        <div class="np-time" id="np-time">কার্ডে ক্লিক করলে notes ও links যোগ করতে পারবেন</div>
        <div id="np-body">
          <div class="np-empty">← যেকোনো কার্ডে ক্লিক করুন</div>
        </div>
      </div>

      <!-- Checklist panel -->
      <div class="panel">
        <div class="checklist-header">
          <div class="checklist-title"><span>✅</span> আজকের checklist</div>
          <button class="cl-reset" onclick="resetChecks()" title="সব uncheck করুন">রিসেট</button>
        </div>
        <div class="cl-date" id="cl-date"></div>
        <div class="cl-progress"><div class="cl-bar" id="cl-bar" style="width:0%"></div></div>
        <div id="cl-list"></div>
        <div class="cl-add">
          <input type="text" id="cl-input" placeholder="নতুন কাজ যোগ করুন..." onkeydown="if(event.key==='Enter')addClItem()"/>
          <button onclick="addClItem()">+</button>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal-box">
    <h3 id="modal-title">ব্লক এডিট করুন</h3>
    <div class="field"><label>সময়</label><input id="e-time" placeholder="যেমন: ৫:৩০–৮:০০"/></div>
    <div class="field"><label>শিরোনাম</label><input id="e-title" placeholder="কাজের নাম"/></div>
    <div class="field"><label>বিবরণ</label><textarea id="e-sub" placeholder="বিস্তারিত (ঐচ্ছিক)"></textarea></div>
    <div class="field"><label>রং বেছে নিন</label><div class="colors" id="color-picker"></div></div>
    <div class="modal-btns">
      <button onclick="closeModal()">বাতিল</button>
      <button class="save" onclick="saveBlock()">সংরক্ষণ</button>
    </div>
  </div>
</div>

<script>
var COLORS=[
  {bg:'#E1F5EE',title:'#085041',sub:'#0F6E56',dot:'#1D9E75',label:'নামাজ'},
  {bg:'#EF9F27',title:'#412402',sub:'#633806',dot:'#BA7517',label:'Bug hunting'},
  {bg:'#E6F1FB',title:'#0C447C',sub:'#185FA5',dot:'#378ADD',label:'অফিস'},
  {bg:'#FBEAF0',title:'#72243E',sub:'#993556',dot:'#D4537E',label:'যাতায়াত'},
  {bg:'#EEEDFE',title:'#3C3489',sub:'#534AB7',dot:'#7F77DD',label:'English'},
  {bg:'#F1EFE8',title:'#2C2C2A',sub:'#5F5E5A',dot:'#888780',label:'বিশ্রাম'},
];

var defaultItems=[
  {type:'section',label:'ভোর — মূল income সেশন'},
  {type:'block',time:'৪:৩০',title:'ফজর নামাজ',sub:'দিন শুরু আল্লাহর স্মরণে',color:0,notes:[]},
  {type:'block',time:'৪:৫০–৫:৩০',title:'বিশ্রাম',sub:'হালকা ঘুম, মাথা clear করুন',color:5,notes:[]},
  {type:'block',time:'৫:৩০–৮:০০',title:'Bug hunting — সকালের সেশন',sub:'মস্তিষ্ক সবচেয়ে তাজা — recon, testing, write-up',color:1,notes:[
    {type:'link',value:'https://hackerone.com',date:''},
    {type:'link',value:'https://bugcrowd.com',date:''},
  ]},
  {type:'block',time:'৮:০০–৮:৫৫',title:'নাস্তা + প্রস্তুতি',sub:'গোসল, খাবার, রেডি হওয়া',color:5,notes:[]},
  {type:'section',label:'যাতায়াত + অফিস'},
  {type:'block',time:'৯:০০–১০:০০',title:'অফিসে যাওয়া',sub:'পথে security podcast শুনুন',color:3,notes:[
    {type:'link',value:'https://darknetdiaries.com',date:''},
  ]},
  {type:'block',time:'১০:০০–১২:৩০',title:'অফিস — সকালের কাজ',sub:'গুরুত্বপূর্ণ tasks আগে শেষ করুন',color:2,notes:[]},
  {type:'block',time:'১২:৩০',title:'যোহর নামাজ',sub:'লাঞ্চ ব্রেকের সাথে পড়ুন',color:0,notes:[]},
  {type:'block',time:'১:০০–২:০০',title:'লাঞ্চ ও বিশ্রাম',sub:'খাওয়া, একটু হাঁটা',color:5,notes:[]},
  {type:'block',time:'২:০০–৪:৩০',title:'অফিস — বিকেলের কাজ',sub:'বাকি tasks শেষ করুন',color:2,notes:[]},
  {type:'block',time:'৪:৩০',title:'আসর নামাজ',sub:'বের হওয়ার আগে পড়ে নিন',color:0,notes:[]},
  {type:'block',time:'৪:৪৫–৭:০০',title:'অফিস শেষ + রওনা',sub:'কাজ গুছিয়ে বের হোন',color:2,notes:[]},
  {type:'section',label:'সন্ধ্যা + রাত'},
  {type:'block',time:'৭:০০–৮:০০',title:'বাড়ি ফেরা',sub:'পথে মাগরিব মসজিদে পড়ুন',color:3,notes:[]},
  {type:'block',time:'~৬:২৫',title:'মাগরিব নামাজ',sub:'ফেরার পথে মসজিদে',color:0,notes:[]},
  {type:'block',time:'৮:০০–৮:৩০',title:'রাতের খাবার + পরিবার',sub:'স্ক্রিন বন্ধ রেখে সময় কাটান',color:5,notes:[]},
  {type:'block',time:'৮:৩০–৯:০০',title:'এশার নামাজ',sub:'English শুরুর আগে পড়ুন',color:0,notes:[]},
  {type:'block',time:'৯:০০–১০:০০',title:'English skill — ১ ঘণ্টা',sub:'Writing / Speaking / Grammar',color:4,notes:[
    {type:'link',value:'https://www.bbc.co.uk/learningenglish',date:''},
  ]},
  {type:'block',time:'১০:০০–১০:৩০',title:'রাতের রুটিন + ঘুম',sub:'পরদিনের target ঠিক করুন, ঘুম',color:5,notes:[]},
];

var defaultChecklist=[
  {id:1,label:'ফজর নামাজ পড়েছি',done:false},
  {id:2,label:'Bug hunting সেশন শেষ',done:false},
  {id:3,label:'যোহর নামাজ পড়েছি',done:false},
  {id:4,label:'আসর নামাজ পড়েছি',done:false},
  {id:5,label:'মাগরিব নামাজ পড়েছি',done:false},
  {id:6,label:'এশার নামাজ পড়েছি',done:false},
  {id:7,label:'English practice করেছি',done:false},
];

var items=[];
var checklist=[];
var editIdx=null;
var selColor=0;
var activeIdx=null;
var clNextId=100;

function todayStr(){
  var d=new Date();
  var days=['রবিবার','সোমবার','মঙ্গলবার','বুধবার','বৃহস্পতিবার','শুক্রবার','শনিবার'];
  return days[d.getDay()]+', '+d.getDate()+'/'+(d.getMonth()+1)+'/'+d.getFullYear();
}

function load(){
  try{
    var r=localStorage.getItem('routine_v4');
    if(r) items=JSON.parse(r);
    else items=JSON.parse(JSON.stringify(defaultItems));
    var cl=localStorage.getItem('checklist_v4');
    if(cl) checklist=JSON.parse(cl);
    else checklist=JSON.parse(JSON.stringify(defaultChecklist));
    // reset checks if new day
    var lastDay=localStorage.getItem('cl_day');
    var today=new Date().toDateString();
    if(lastDay!==today){
      checklist.forEach(function(c){c.done=false;});
      localStorage.setItem('cl_day',today);
      saveAll();
    }
  }catch(e){
    items=JSON.parse(JSON.stringify(defaultItems));
    checklist=JSON.parse(JSON.stringify(defaultChecklist));
  }
}

function saveAll(){
  try{
    localStorage.setItem('routine_v4',JSON.stringify(items));
    localStorage.setItem('checklist_v4',JSON.stringify(checklist));
  }catch(e){}
}

function isUrl(s){return /^https?:\/\//i.test(s)||/^www\./i.test(s);}

/* ---- TIMELINE ---- */
function render(){
  var tl=document.getElementById('timeline');
  tl.innerHTML='';
  for(var i=0;i<items.length;i++){
    var item=items[i];
    if(item.type==='section'){
      var s=document.createElement('div');
      s.className='section-label';
      s.textContent=item.label;
      (function(idx){s.ondblclick=function(){var v=prompt('সেকশনের নাম:',items[idx].label);if(v&&v.trim()){items[idx].label=v.trim();saveAll();render();}};})(i);
      tl.appendChild(s);
      continue;
    }
    var c=COLORS[item.color||0];
    if(!item.notes)item.notes=[];
    var blk=document.createElement('div');
    blk.className='block';

    var tc=document.createElement('div');tc.className='time-col';
    var inp=document.createElement('input');inp.type='text';inp.value=item.time||'';
    (function(idx,el){el.onchange=function(){items[idx].time=this.value;saveAll();};el.onclick=function(e){e.stopPropagation();};})(i,inp);
    tc.appendChild(inp);blk.appendChild(tc);

    var lc=document.createElement('div');lc.className='line-col';
    var dot=document.createElement('div');dot.className='dot';dot.style.background=c.dot;dot.title='ডাবল ক্লিক = এডিট';
    (function(idx){dot.ondblclick=function(e){e.stopPropagation();openModal(idx);};})(i);
    lc.appendChild(dot);
    if(i<items.length-1){var vl=document.createElement('div');vl.className='vline';lc.appendChild(vl);}
    blk.appendChild(lc);

    var card=document.createElement('div');
    card.className='card'+(activeIdx===i?' active':'');
    card.style.background=c.bg;
    (function(idx){card.onclick=function(){activeIdx=idx;render();renderNotes();};})(i);
    var ct=document.createElement('div');ct.className='card-title';ct.style.color=c.title;ct.textContent=item.title;
    if(item.notes.length>0){var nb=document.createElement('span');nb.className='note-count';nb.style.color=c.title;nb.textContent=item.notes.length+' টি';ct.appendChild(nb);}
    card.appendChild(ct);
    if(item.sub){var cs=document.createElement('div');cs.className='card-sub';cs.style.color=c.sub;cs.textContent=item.sub;card.appendChild(cs);}
    blk.appendChild(card);

    var db=document.createElement('button');db.className='del-btn';db.textContent='✕';
    (function(idx){db.onclick=function(e){e.stopPropagation();if(confirm('মুছে ফেলবেন?')){if(activeIdx===idx)activeIdx=null;items.splice(idx,1);saveAll();render();renderNotes();}};})(i);
    blk.appendChild(db);
    tl.appendChild(blk);
  }
}

/* ---- NOTES ---- */
function renderNotes(){
  var body=document.getElementById('np-body');
  var titleEl=document.getElementById('np-title');
  var timeEl=document.getElementById('np-time');
  if(activeIdx===null||!items[activeIdx]||items[activeIdx].type!=='block'){
    titleEl.textContent='কোনো ব্লক সিলেক্ট করুন';
    timeEl.textContent='কার্ডে ক্লিক করলে notes ও links যোগ করতে পারবেন';
    body.innerHTML='<div class="np-empty">← যেকোনো কার্ডে ক্লিক করুন</div>';
    return;
  }
  var item=items[activeIdx];
  var notes=item.notes||[];
  titleEl.textContent=item.title;
  timeEl.textContent=item.time||'';
  var html='';
  if(notes.length===0){html+='<div class="np-empty" style="padding:8px 0 10px;">এখনো কিছু নেই।</div>';}
  notes.forEach(function(n,ni){
    html+='<div class="note-item"><button class="note-del" onclick="deleteNote('+ni+')">✕</button>';
    if(n.type==='link'){var url=/^https?:\/\//i.test(n.value)?n.value:'https://'+n.value;html+='<a class="note-link" href="'+url+'" target="_blank">'+n.value+'</a>';}
    else{html+='<div class="note-text">'+n.value.replace(/</g,'&lt;')+'</div>';}
    if(n.date)html+='<div class="note-date">'+n.date+'</div>';
    html+='</div>';
  });
  html+='<div class="add-area"><textarea id="note-input" placeholder="নোট লিখুন অথবা link paste করুন..."></textarea><div class="add-btns"><button class="btn-note" onclick="addNote(false)">+ নোট</button><button class="btn-link" onclick="addNote(true)">+ Link</button></div></div>';
  body.innerHTML=html;
}

function addNote(forceLink){
  var el=document.getElementById('note-input');
  var val=el?el.value.trim():'';
  if(!val)return;
  if(!items[activeIdx].notes)items[activeIdx].notes=[];
  var type=(forceLink||isUrl(val))?'link':'text';
  var d=new Date();
  items[activeIdx].notes.push({type:type,value:val,date:d.getDate()+'/'+(d.getMonth()+1)});
  saveAll();render();renderNotes();
}

function deleteNote(ni){
  items[activeIdx].notes.splice(ni,1);
  saveAll();render();renderNotes();
}

/* ---- CHECKLIST ---- */
function renderChecklist(){
  document.getElementById('cl-date').textContent=todayStr();
  var list=document.getElementById('cl-list');
  list.innerHTML='';
  var done=checklist.filter(function(c){return c.done;}).length;
  var pct=checklist.length>0?Math.round(done/checklist.length*100):0;
  document.getElementById('cl-bar').style.width=pct+'%';

  checklist.forEach(function(c,i){
    var div=document.createElement('div');
    div.className='cl-item'+(c.done?' done':'');
    div.onclick=function(){checklist[i].done=!checklist[i].done;saveAll();renderChecklist();};

    var box=document.createElement('div');box.className='cl-check';
    var tick=document.createElement('span');tick.className='cl-check-tick';tick.textContent='✓';
    box.appendChild(tick);div.appendChild(box);

    var lbl=document.createElement('span');lbl.className='cl-label';lbl.textContent=c.label;div.appendChild(lbl);

    var del=document.createElement('button');del.className='cl-del';del.textContent='✕';
    del.onclick=function(e){e.stopPropagation();checklist.splice(i,1);saveAll();renderChecklist();};
    div.appendChild(del);
    list.appendChild(div);
  });
}

function addClItem(){
  var inp=document.getElementById('cl-input');
  var val=inp.value.trim();
  if(!val)return;
  checklist.push({id:clNextId++,label:val,done:false});
  inp.value='';
  saveAll();renderChecklist();
}

function resetChecks(){
  if(confirm('সব check উঠিয়ে দেবেন?')){
    checklist.forEach(function(c){c.done=false;});
    saveAll();renderChecklist();
  }
}

/* ---- MODAL ---- */
function openModal(idx){
  editIdx=idx;
  var item=items[idx];
  document.getElementById('e-time').value=item.time||'';
  document.getElementById('e-title').value=item.title||'';
  document.getElementById('e-sub').value=item.sub||'';
  selColor=item.color||0;
  renderColorPicker();
  document.getElementById('modal-title').textContent='ব্লক এডিট করুন';
  document.getElementById('modal-overlay').classList.add('open');
}

function renderColorPicker(){
  var cp=document.getElementById('color-picker');cp.innerHTML='';
  for(var i=0;i<COLORS.length;i++){
    var d=document.createElement('div');
    d.className='color-opt'+(i===selColor?' selected':'');
    d.style.background=COLORS[i].dot;d.title=COLORS[i].label;
    (function(ci){d.onclick=function(){selColor=ci;renderColorPicker();};})(i);
    cp.appendChild(d);
  }
}

function closeModal(){document.getElementById('modal-overlay').classList.remove('open');editIdx=null;}

function saveBlock(){
  var t=document.getElementById('e-title').value.trim();
  if(!t){alert('শিরোনাম লিখুন');return;}
  var obj={type:'block',time:document.getElementById('e-time').value,title:t,sub:document.getElementById('e-sub').value,color:selColor,notes:editIdx!==null?(items[editIdx].notes||[]):[]};
  if(editIdx===null){items.push(obj);}else{items[editIdx]=obj;}
  closeModal();saveAll();render();if(activeIdx!==null)renderNotes();
}

function addBlock(){
  editIdx=null;selColor=0;
  document.getElementById('e-time').value='';document.getElementById('e-title').value='';document.getElementById('e-sub').value='';
  document.getElementById('modal-title').textContent='নতুন ব্লক যোগ করুন';
  renderColorPicker();document.getElementById('modal-overlay').classList.add('open');
}

function addSection(){
  var v=prompt('সেকশনের নাম লিখুন:');
  if(v&&v.trim()){items.push({type:'section',label:v.trim()});saveAll();render();}
}

document.getElementById('modal-overlay').addEventListener('click',function(e){if(e.target===this)closeModal();});

load();render();renderNotes();renderChecklist();
</script>
</body>
</html>
